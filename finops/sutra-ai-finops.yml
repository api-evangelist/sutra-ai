description: >-
  FinOps view of SUTRA (Two AI) spend. SUTRA bills usage-based per-token rates
  for chat completions (SUTRA-V2) and reasoning (SUTRA-R0) through an
  OpenAI-compatible API. SUTRA's efficient tokenizer reduces token consumption
  by roughly 3-5x for non-English languages, which directly lowers per-request
  cost for multilingual workloads. Specific per-model rates are arranged with
  Two AI and are not publicly reconciled here.
notes: >-
  Per-model rates are not published on a public pricing page at capture time;
  verify with Two AI during reconciliation. Token-efficiency gains for
  non-English languages should be modeled when forecasting spend.

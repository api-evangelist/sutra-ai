  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - model
  - api
- name: output_tokens
  description: Tokens generated, billed per 1M tokens per model.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - model
  - api
principles:
- name: Visibility
  description: Track per-model token burn across SUTRA-V2 and SUTRA-R0; inspect usage per API key.
- name: Allocation
  description: Tag API keys per workload/team and map to internal cost centers.
- name: Optimization
  description: Exploit SUTRA's 3-5x non-English token efficiency; route reasoning-heavy work to SUTRA-R0 only when needed; use SUTRA-V2 for general multilingual chat.
- name: Accountability
  description: Assign owners per project/key; review token spend monthly against budget.

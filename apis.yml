aid: sutra-ai
url: https://raw.githubusercontent.com/api-evangelist/sutra-ai/refs/heads/main/apis.yml
name: SUTRA (Two AI)
kind: company
description: SUTRA is a family of multilingual large language models from Two AI
  (Numeric), fluent in 50+ languages including Hindi, Gujarati, Tamil, Bengali,
  Korean, Arabic, and Japanese. The SUTRA API is OpenAI-compatible and serves the
  SUTRA-V2 instruction/conversation model and the SUTRA-R0 reasoning model through
  a single Bearer-authenticated REST interface.
